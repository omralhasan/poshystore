<!doctype html>
<html ⚡ lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <title>{{product_name}} | Poshy Store</title>
  <meta name="description" content="{{product_seo_description}}">

  <link rel="canonical" href="{{canonical_url}}">

  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.2.js"></script>
  <script async custom-element="amp-form" src="https://cdn.ampproject.org/v0/amp-form-0.1.js"></script>
  <script async custom-template="amp-mustache" src="https://cdn.ampproject.org/v0/amp-mustache-0.2.js"></script>

  <style amp-boilerplate>
    body {
      -webkit-animation: -amp-start 8s steps(1,end) 0s 1 normal both;
      -moz-animation: -amp-start 8s steps(1,end) 0s 1 normal both;
      -ms-animation: -amp-start 8s steps(1,end) 0s 1 normal both;
      animation: -amp-start 8s steps(1,end) 0s 1 normal both;
    }

    @-webkit-keyframes -amp-start {
      from { visibility: hidden; }
      to { visibility: visible; }
    }

    @-moz-keyframes -amp-start {
      from { visibility: hidden; }
      to { visibility: visible; }
    }

    @-ms-keyframes -amp-start {
      from { visibility: hidden; }
      to { visibility: visible; }
    }

    @-o-keyframes -amp-start {
      from { visibility: hidden; }
      to { visibility: visible; }
    }

    @keyframes -amp-start {
      from { visibility: hidden; }
      to { visibility: visible; }
    }
  </style>
  <noscript>
    <style amp-boilerplate>
      body {
        -webkit-animation: none;
        -moz-animation: none;
        -ms-animation: none;
        animation: none;
      }
    </style>
  </noscript>

  <style amp-custom>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #111111;
      --muted: #8a8f98;
      --accent: #101010;
      --border: #e7eaee;
      --price: #111111;
      --price-old: #98a0a8;
      --ok: #215732;
      --err: #9f2b2b;
      --sale: #111111;
      --new: #d73f7c;
      --badge: #e12727;
      --gold: #d4a64d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .announcement {
      background: #000;
      color: #fff;
      text-align: center;
      font-size: 0.74rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 7px 12px;
      font-weight: 500;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      height: 58px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .nav-icons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #222;
      text-decoration: none;
      font-size: 0.98rem;
      position: relative;
      background: #fff;
    }

    .cart-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      min-width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--badge);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      line-height: 1;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
    }

    .product {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }

    .media {
      border-bottom: 1px solid var(--border);
      background: #fff;
      padding: 12px;
    }

    .hero-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .badges {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .badge {
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #fff;
      font-weight: 700;
      padding: 5px 8px;
      border-radius: 6px;
    }

    .badge-sale {
      background: var(--sale);
    }

    .badge-new {
      background: var(--new);
    }

    .hero {
      width: 100%;
      display: block;
    }

    .thumbs {
      margin-top: 10px;
    }

    .thumbs amp-img {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .details {
      padding: 20px 16px 24px;
    }

    .title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .rating {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .stars {
      color: var(--gold);
      letter-spacing: 0.05em;
      font-size: 0.95rem;
      line-height: 1;
    }

    .price-row {
      margin: 8px 0 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--price);
    }

    .old-price {
      font-size: 0.96rem;
      color: var(--price-old);
      text-decoration: line-through;
    }

    .description {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .form {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .label {
      font-size: 0.82rem;
      color: #656b72;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: inline-block;
    }

    .qty {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.86rem;
      font-weight: 500;
      background: #fff;
      color: #1f2328;
      min-height: 36px;
    }

    .chip-input:checked + .chip {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .actions {
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 13px 18px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .btn:hover,
    .btn:focus {
      opacity: 0.92;
    }

    .msg {
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .msg.success {
      color: var(--ok);
    }

    .msg.error {
      color: var(--err);
    }

    .meta {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (min-width: 768px) {
      .page {
        padding: 28px;
      }

      .header-inner {
        padding: 0 28px;
      }

      .product {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .media {
        border-right: 1px solid var(--border);
        border-bottom: 0;
      }

      .details {
        padding: 32px;
      }

      .title {
        font-size: 1.9rem;
      }

      .price {
        font-size: 1.55rem;
      }

      .media {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="announcement">Free delivery in Jordan on orders over {{free_shipping_threshold}}</div>
  <header class="header" aria-label="Store header">
    <div class="header-inner">
      <h2 class="brand">BeautyBox Jordan</h2>
      <nav class="nav-icons" aria-label="Quick actions">
        <a class="icon" href="{{search_url}}" aria-label="Search">⌕</a>
        <a class="icon" href="{{profile_url}}" aria-label="Profile">👤</a>
        <a class="icon" href="{{cart_url}}" aria-label="Cart">🛒<span class="cart-badge">{{cart_count}}</span></a>
      </nav>
    </div>
  </header>

  <main class="page">
    <article class="product" aria-label="Product details">
      <section class="media">
        <div class="hero-wrap">
          <div class="badges">
            <span class="badge badge-sale">Sale</span>
            <span class="badge badge-new">New</span>
          </div>
          <amp-img
            class="hero"
            src="{{product_image_1}}"
            width="1200"
            height="1200"
            layout="responsive"
            alt="{{product_name}} main image">
          </amp-img>
        </div>

        <div class="thumbs">
          <amp-carousel
            width="800"
            height="120"
            layout="responsive"
            type="carousel"
            visible-count="3.2"
            controls
            aria-label="Product thumbnail slider">
            <amp-img src="{{product_image_1}}" width="120" height="120" layout="responsive" alt="{{product_name}} thumbnail 1"></amp-img>
            <amp-img src="{{product_image_2}}" width="120" height="120" layout="responsive" alt="{{product_name}} thumbnail 2"></amp-img>
            <amp-img src="{{product_image_3}}" width="120" height="120" layout="responsive" alt="{{product_name}} thumbnail 3"></amp-img>
            <amp-img src="{{product_image_4}}" width="120" height="120" layout="responsive" alt="{{product_name}} thumbnail 4"></amp-img>
          </amp-carousel>
        </div>
      </section>

      <section class="details">
        <h1 class="title">{{product_name}}</h1>
        <div class="rating" aria-label="Product rating">
          <span class="stars">★★★★★</span>
          <span>{{product_rating}} ({{product_review_count}} reviews)</span>
        </div>
        <div class="price-row">
          <p class="price">{{product_price}}</p>
          <p class="old-price">{{product_old_price}}</p>
        </div>
        <p class="description">{{product_description}}</p>

        <form class="form" method="post" action-xhr="/api/add-to-cart" action="/api/add-to-cart" target="_top">
          <input type="hidden" name="product_id" value="{{product_id}}">
          <input type="hidden" name="product_name" value="{{product_name}}">
          <input type="hidden" name="product_price" value="{{product_price_raw}}">

          <div>
            <span class="label">Size</span>
            <div class="chips" role="group" aria-label="Select size">
              <input class="chip-input" type="radio" id="size_s" name="size" value="S" checked>
              <label class="chip" for="size_s">S</label>

              <input class="chip-input" type="radio" id="size_m" name="size" value="M">
              <label class="chip" for="size_m">M</label>

              <input class="chip-input" type="radio" id="size_l" name="size" value="L">
              <label class="chip" for="size_l">L</label>
            </div>
          </div>

          <div>
            <span class="label">Color</span>
            <div class="chips" role="group" aria-label="Select color">
              <input class="chip-input" type="radio" id="color_rose" name="color" value="Rose" checked>
              <label class="chip" for="color_rose">Rose</label>

              <input class="chip-input" type="radio" id="color_nude" name="color" value="Nude">
              <label class="chip" for="color_nude">Nude</label>

              <input class="chip-input" type="radio" id="color_clear" name="color" value="Clear">
              <label class="chip" for="color_clear">Clear</label>
            </div>
          </div>

          <div>
            <label class="label" for="quantity">Quantity</label>
            <input id="quantity" class="qty" type="number" name="quantity" min="1" value="1" required>
          </div>

          <div class="actions">
            <button class="btn" type="submit">Add to Cart</button>
          </div>

          <div submit-success>
            <template type="amp-mustache">
              <p class="msg success">{{message}}</p>
            </template>
          </div>

          <div submit-error>
            <template type="amp-mustache">
              <p class="msg error">{{message}}</p>
            </template>
          </div>
        </form>

        <p class="meta">SKU: {{product_sku}}</p>
      </section>
    </article>
  </main>
</body>
</html>

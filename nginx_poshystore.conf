# Fixed Poshy Store Nginx Configuration
# Properly routes admin pages and all PHP requests

server {
    listen 80;
    listen [::]:80;
    server_name poshystore.com;
    root /var/www/html;
    index index.php index.html;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/letsencrypt/.well-known/acme-challenge/;
        allow all;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to sensitive files by extension
    location ~ \.(env|config\.php|sql|bak|backup)$ {
        deny all;
    }

    # PHP files - process all PHP requests properly
    # IMPORTANT: No try_files with =404 here - let PHP-FPM handle all responses
    location ~ \.php$ {
        fastcgi_pass   unix:/run/php-fpm/www.sock;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
        
        # Timeouts for PHP-FPM
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    # Static assets - cache them
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Main routing - let PHP handle URL rewriting
    # This allows clean URLs and custom 404 pages to work
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}

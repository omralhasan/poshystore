# Poshy Store Nginx Configuration
# Bilingual routing: / = English, /ar/ = Arabic
# Legacy redirects from ?lang= and Arabic-text paths

server {
    listen 80;
    listen [::]:80;
    server_name poshystore.com;
    root /var/www/html;
    index index.php index.html;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/letsencrypt/.well-known/acme-challenge/;
        allow all;
    }

    # Deny access to dotfiles (except .well-known)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to sensitive files by extension
    location ~ \.(env|config\.php|sql|bak|backup)$ {
        deny all;
    }

    # ── 301 redirect ?lang= query strings ──────────────────────────────
    # ?lang=ar → /ar/<path>
    if ($arg_lang = "ar") {
        return 301 /ar$uri;
    }
    # ?lang=en → strip query param (root = English)
    if ($arg_lang = "en") {
        set $strip_lang $uri;
        return 301 $strip_lang;
    }

    # ── 301 redirect legacy Arabic-text URLs ──────────────────────────
    # /منتج/slug → /ar/slug  (URL-encoded and literal)
    location ~ ^/%D9%85%D9%86%D8%AA%D8%AC/(.+)$ {
        return 301 /ar/$1;
    }
    location ~ ^/منتج/(.+)$ {
        return 301 /ar/$1;
    }

    # /بودكاست → /ar/podcast
    location = /%D8%A8%D9%88%D8%AF%D9%83%D8%A7%D8%B3%D8%AA {
        return 301 /ar/podcast;
    }
    location = /بودكاست {
        return 301 /ar/podcast;
    }
    # /بودكاست/slug → /ar/podcast/slug
    location ~ ^/%D8%A8%D9%88%D8%AF%D9%83%D8%A7%D8%B3%D8%AA/(.+)$ {
        return 301 /ar/podcast/$1;
    }
    location ~ ^/بودكاست/(.+)$ {
        return 301 /ar/podcast/$1;
    }

    # /متجر → /ar/
    location = /%D9%85%D8%AA%D8%AC%D8%B1 {
        return 301 /ar/;
    }
    location = /متجر {
        return 301 /ar/;
    }

    # /سلة → /ar/pages/shop/guest_checkout.php
    location = /%D8%B3%D9%84%D8%A9 {
        return 301 /ar/pages/shop/guest_checkout.php;
    }
    location = /سلة {
        return 301 /ar/pages/shop/guest_checkout.php;
    }

    # ── Feeds directory (public CSV files) ─────────────────────────────
    location ^~ /feeds/ {
        # Allow .csv and .htaccess (ignored by nginx), deny the rest
        location ~* \.csv$ {
            add_header Content-Type "text/csv; charset=UTF-8";
        }
    }

    # PHP files - process all PHP requests properly
    location ~ \.php$ {
        fastcgi_pass   unix:/run/php-fpm/www.sock;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  HTTP_AUTHORIZATION $http_authorization;

        # Pass the original URI so PHP can detect /ar/ prefix
        fastcgi_param  REQUEST_URI $request_uri;

        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    # Static assets - cache them
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Main routing ───────────────────────────────────────────────────
    # /ar/<path> falls through here — try_files tries the literal path,
    # doesn't find it, and internally redirects to /index.php.
    # PHP's language.php then detects /ar/ from REQUEST_URI.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}

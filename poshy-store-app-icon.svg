<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Poshy Store app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9E6EE"/>
      <stop offset="100%" stop-color="#F2D3DC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7D88B"/>
      <stop offset="55%" stop-color="#E5B84A"/>
      <stop offset="100%" stop-color="#C9952E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#A77E2E" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <circle cx="260" cy="240" r="260" fill="url(#glow)"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="url(#gold)" stroke-width="22" opacity="0.85"/>

  <g filter="url(#shadow)">
    <rect x="312" y="240" width="160" height="560" rx="80" fill="url(#gold)"/>
    <circle cx="532" cy="380" r="180" fill="url(#gold)"/>
    <circle cx="532" cy="380" r="92" fill="url(#bg)"/>
  </g>

  <circle cx="512" cy="720" r="6" fill="#E5B84A" opacity="0.8"/>
</svg>
